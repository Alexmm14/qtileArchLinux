[colors.primary]
background = '#000000' # Negro puro (puedes usar #0c0c0c para un gris muy oscuro)
foreground = '#eeeeec' # El blanco suave de la terminal de Ubuntu

[colors.cursor]
text = '#000000'
cursor = '#e95420' # Naranja Ubuntu

[colors.normal]
black =   '#2e3436'
red =     '#cc0000'
green =   '#4e9a06'
yellow =  '#c4a000'
blue =    '#3465a4'
magenta = '#75507b'
cyan =    '#06989a'
white =   '#d3d7cf'

[colors.bright]
black =   '#555753'
red =     '#ef2929'
green =   '#8ae234'
yellow =  '#fce94f'
blue =    '#729fcf'
magenta = '#ad7fa8'
cyan =    '#34e2e2'
white =   '#eeeeec'


[cursor.style]
shape = "Beam"     # "Beam" es la línea vertical delgada
blinking = "On"    # Opcional: "On", "Off" o "Always"

[cursor]
thickness = 0.15   # Controla qué tan delgada es la línea (valores entre 0.0 y 1.0)


[window]
padding = { x = 10, y = 10 } # Un poco de margen mejora mucho la vista
opacity = 0.8                # Cambia a 0.9 si quieres un toque traslúcido
decorations = "full"         # Mantener la barra de título estándar



